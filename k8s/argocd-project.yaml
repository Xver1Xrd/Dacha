      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: apps
      kind: Deployment
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Endpoints