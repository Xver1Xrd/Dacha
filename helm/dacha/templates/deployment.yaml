apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dacha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "dacha.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dacha.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dacha.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-secrets
          image: "{{ .Values.image.backendRepository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              if [ -f /secret/data.json ]; then
                cp /secret/data.json /home/app/data.json
              elif [ ! -f /home/app/data.json ]; then
                echo "{}" > /home/app/data.json
              fi
          volumeMounts:
            - name: data
              mountPath: /home/app
            - name: secret-config
              mountPath: /secret
              readOnly: true
      containers:
        - name: backend
          image: "{{ .Values.image.backendRepository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: DATABASE_TYPE
              value: "file"
            - name: DATA_FILE
              value: "/home/app/data.json"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: data
              mountPath: /home/app
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/data
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/data
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: frontend
          image: "{{ .Values.image.frontendRepository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "dacha.fullname" . }}-data
        - name: secret-config
          secret:
            secretName: dacha-secrets
            optional: true
