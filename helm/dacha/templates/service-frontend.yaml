apiVersion: v1
kind: Service
metadata:
  name: {{ include "dacha.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels: {{ include "dacha.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector: {{ include "dacha.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
