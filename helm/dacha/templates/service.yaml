apiVersion: v1
kind: Service
metadata:
  name: {{ include "dacha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dacha.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "dacha.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP