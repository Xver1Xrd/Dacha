apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dacha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dacha.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  rules:
    - host: {{ .Values.ingress.frontendHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dacha.fullname" . }}-frontend
                port:
                  number: 8080
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "dacha.fullname" . }}-backend
                port:
                  number: 8080
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.frontendHost }}
      secretName: {{ include "dacha.fullname" . }}-frontend-tls
    - hosts:
        - {{ .Values.ingress.apiHost }}
      secretName: {{ include "dacha.fullname" . }}-api-tls